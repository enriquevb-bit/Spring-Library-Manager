# Perfil de produccion del Authorization Server (Render).
# NO contiene secretos: la URL publica llega por variable de entorno.

server.port=${PORT:9000}

# Fija el "issuer" del JWT a la URL publica (debe coincidir con la del backend).
spring.security.oauth2.authorizationserver.issuer=${AUTH_ISSUER_URI}

# Render termina el HTTPS por delante: respetar X-Forwarded-* para que las URLs
# de /.well-known/openid-configuration salgan con https en vez de http.
server.forward-headers-strategy=framework
