# Perfil de produccion (Render + MySQL en Clever Cloud).
# NO contiene secretos: todos los valores sensibles llegan por variables de entorno.

server.port=${PORT:8080}
# Render hace de proxy HTTPS: respetar las cabeceras X-Forwarded-*
server.forward-headers-strategy=framework

# Base de datos MySQL (credenciales inyectadas como variables de entorno en Render)
spring.datasource.url=${MYSQL_URL}
spring.datasource.username=${MYSQL_USER}
spring.datasource.password=${MYSQL_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.database=mysql
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# El esquema se crea/actualiza al arrancar y se mantiene entre reinicios
spring.jpa.hibernate.ddl-auto=update

# Pool reducido para no agotar las 5 conexiones del plan DEV de Clever Cloud
spring.datasource.hikari.maximum-pool-size=3

# En produccion el catalogo se siembra una sola vez a mano (data.sql NO se reejecuta)
spring.sql.init.mode=never
spring.flyway.enabled=false
spring.docker.compose.enabled=false

# Resource Server: valida los JWT contra el Auth Server desplegado
spring.security.oauth2.resourceserver.jwt.issuer-uri=${AUTH_ISSUER_URI}
